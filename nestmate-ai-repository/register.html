<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NestMate AI - Register</title>
    <style>
        body { font-family: sans-serif; display: grid; place-items: center; height: 100vh; background: #f5f7fa; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 20px; shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #007aff; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>Create Account</h2>
    <p>Join NestMate AI</p>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Create Password">
    <button onclick="signUp()">Register & Verify</button>
    <p id="status"></p>
    <p><a href="login.html">Already have an account? Login</a></p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  // PASTE YOUR KEYS BELOW THIS LINE
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.signUp = async function() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    const status = document.getElementById('status');

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
      await sendEmailVerification(auth.currentUser);
      status.innerText = "Check your email for a verification link!";
      status.style.color = "green";
    } catch (error) {
      status.innerText = error.message;
      status.style.color = "red";
    }
  };
</script>

</body>
</html>
