<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NestMate AI - Register</title>
    <style>
        body { font-family: sans-serif; display: grid; place-items: center; height: 100vh; background: #f5f7fa; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #007aff; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>Create Account</h2>
    <p>Join NestMate AI</p>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Create Password">
    <button onclick="signUp()">Register & Verify</button>
    <p id="status"></p>
    <p><a href="login.html">Already have an account? Login</a></p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, sendEmailVerification, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDTxyr3zJGsyfmdztvfFz8aw9XSyPCNeQM",
    authDomain: "nestmate-ai.firebaseapp.com",
    projectId: "nestmate-ai",
    storageBucket: "nestmate-ai.firebasestorage.app",
    messagingSenderId: "7053398074",
    appId: "1:7053398074:web:13dc18b49402d95107a503"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // If already logged in and verified, skip register
  onAuthStateChanged(auth, (user) => {
    if (user && user.emailVerified) {
      window.location.replace("index.html");
    }
  });

  window.signUp = async function() {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    const status = document.getElementById('status');
    const btn = document.querySelector('button');

    if (!email || !pass) {
      status.innerText = "Please fill in both fields.";
      status.style.color = "red";
      return;
    }

    btn.disabled = true;
    btn.innerText = 'Creating account…';

    try {
      await createUserWithEmailAndPassword(auth, email, pass);
      await sendEmailVerification(auth.currentUser);
      status.innerText = "Check your email for a verification link, then login!";
      status.style.color = "green";
      btn.innerText = 'Done! Check your email';
    } catch (error) {
      const messages = {
        'auth/email-already-in-use': 'An account already exists with this email.',
        'auth/weak-password': 'Password must be at least 6 characters.',
        'auth/invalid-email': 'Please enter a valid email address.'
      };
      status.innerText = messages[error.code] || error.message;
      status.style.color = "red";
      btn.disabled = false;
      btn.innerText = 'Register & Verify';
    }
  };
</script>

</body>
</html>
