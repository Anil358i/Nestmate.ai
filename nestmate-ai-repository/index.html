<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NestMate AI - London Housing</title>
  
  <link rel="stylesheet" href="src/style.css">

  <style>
    /* Security Guard Styles */
    #auth-overlay {
      position: fixed;
      inset: 0;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .spinner {
      width: 30px;
      height: 30px;
      border: 2px solid rgba(0,0,0,0.05);
      border-top: 2px solid #000;
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .page-shell { visibility: hidden; opacity: 0; transition: opacity 0.6s ease; }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDTxyr3zJGsyfmdztvfFz8aw9XSyPCNeQM",
      authDomain: "nestmate-ai.firebaseapp.com",
      projectId: "nestmate-ai",
      storageBucket: "nestmate-ai.firebasestorage.app",
      messagingSenderId: "7053398074",
      appId: "1:7053398074:web:13dc18b49402d95107a503"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    window.db = getFirestore(app);
    window.dbTools = { collection, addDoc, onSnapshot, query, orderBy };

    // Global Logout Tool
    window.handleLogout = async () => {
      try {
        await signOut(auth);
      } catch (error) {
        console.error("Logout Error:", error);
      }
    };

    onAuthStateChanged(auth, (user) => {
      const overlay = document.getElementById('auth-overlay');
      const shell = document.querySelector('.page-shell');

      if (user && user.emailVerified) {
        if(overlay) overlay.style.display = 'none';
        if(shell) {
          shell.style.visibility = 'visible';
          shell.style.opacity = '1';
        }
        if (typeof window.loadProperties === "function") window.loadProperties();
        
        // Slight delay to ensure smooth CSS animations
        setTimeout(() => {
          document.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible'));
        }, 150);
      } else {
        window.location.href = "login.html";
      }
    });
  </script>

  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body>

  <div id="auth-overlay">
    <div class="spinner"></div>
    <p style="font-weight: 500;">Connecting to NestMate...</p>
  </div>

  <div id="popupBackdrop" class="popup-backdrop" hidden onclick="closePopup()">
    <div class="popup-card" onclick="event.stopPropagation()">
      <h2 id="popupTitle"></h2>
      <p id="popupBody"></p>
      <button class="apple-btn-black" onclick="closePopup()">Close</button>
    </div>
  </div>

  <div class="page-shell">
    <header class="site-header">
      <div class="nav-inner">
        <div class="logo">NestMate AI</div>
        <nav class="nav-links">
          <a href="#explore">Explore</a>
          <a href="#list-property">Host</a>
          <a href="#demo">AI Chat</a>
        </nav>
        
        <div class="user-menu-container">
          <div class="profile-trigger" onclick="toggleUserMenu()">
            <span>A</span>
          </div>
          
          <div id="userDropdown" class="user-dropdown">
            <div class="dropdown-item" onclick="openPopup('Settings', 'Account and preference settings are coming in the next update.')">Settings</div>
            <div class="dropdown-item" onclick="openPopup('Contact', 'Questions? Reach us at support@nestmate.ai')">Contact</div>
            <hr class="dropdown-divider">
            <div class="dropdown-item logout-btn" onclick="handleLogout()">Logout</div>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="hero-section fade-in">
        <h1 class="hero-title">Live in London <span>for almost free.</span></h1>
        <p class="hero-copy">Rent a 3-bed house, fill spare rooms, and save up to £1,800.</p>
      </section>

      <section class="explore-section fade-in" id="explore">
        <div class="section-header">
          <h2>Available Listings</h2>
          <div class="toggle-group">
            <button class="toggle-btn active" onclick="setDuration('day', this)">Day</button>
            <button class="toggle-btn" onclick="setDuration('week', this)">Week</button>
            <button class="toggle-btn" onclick="setDuration('month', this)">Month</button>
          </div>
        </div>

        <div class="carousel-outer">
          <div id="carouselTrack" class="carousel-track"></div>
        </div>
      </section>

      <section class="upload-section fade-in" id="list-property">
        <div class="glass-card">
          <p style="color: #0071e3; font-weight: 700; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px;">For Hosts</p>
          <h2>Share your space.</h2>
          <input type="text" id="propName" placeholder="Property Name (e.g. Camden Studio)">
          <input type="number" id="propPriceWeek" placeholder="Weekly Rent (£)">
          <p class="instruction-text">Photo selection opens after you tap Publish.</p>
          <button onclick="uploadProperty()" class="apple-btn-black">Publish</button>
          <p id="uploadStatus" style="margin-top: 15px; font-size: 0.9rem; font-weight: 500;"></p>
        </div>
      </section>

      <section class="demo-section fade-in" id="demo">
        <div class="chat-wrapper">
          <div class="chat-messages" id="chatBox"></div>
          <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Ask NestMate AI..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" class="send-btn">Send</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="src/responses.js"></script>
  <script src="src/chat.js"></script>
</body>
</html>
