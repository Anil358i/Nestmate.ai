<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NestMate AI - London</title>
  <link rel="stylesheet" href="src/style.css">
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDTxyr3zJGsyfmdztvfFz8aw9XSyPCNeQM",
      authDomain: "nestmate-ai.firebaseapp.com",
      projectId: "nestmate-ai",
      storageBucket: "nestmate-ai.firebasestorage.app",
      messagingSenderId: "7053398074",
      appId: "1:7053398074:web:13dc18b49402d95107a503"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    window.db = getFirestore(app);
    window.dbTools = { collection, addDoc, onSnapshot, query, orderBy };

    window.handleLogout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
      const shell = document.querySelector('.page-shell');
      if (user && user.emailVerified) {
        document.getElementById('auth-overlay').style.display = 'none';
        shell.style.visibility = 'visible'; shell.style.opacity = '1';
        if (typeof window.loadProperties === "function") window.loadProperties();
        setTimeout(() => document.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible')), 150);
      } else {
        window.location.href = "login.html";
      }
    });
  </script>
  <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
</head>
<body>

  <div id="auth-overlay" style="position:fixed;inset:0;background:white;display:flex;align-items:center;justify-content:center;z-index:10000;">
    <p>Connecting...</p>
  </div>
  <!-- VIDEO MODAL -->
<div id="videoModal" class="video-modal-backdrop" onclick="closeVideoModal(event)">
  <div class="video-modal-card">
    <button class="video-close-btn" onclick="closeVideoModal()">&#x2715;</button>
    <div class="video-container">
      <video id="nestVideo" src="https://console.cloudinary.com/app/c-e51d30b1c087b5da11df11794d949d/assets/media_library/search?sortDirection=desc&sortField=uploaded_at&q=%7B%22uploadedTimeOption%22%3A%22today%22%2C%22createdTimeOption%22%3A%22today%22%2C%22createdByUsers%22%3A%5B%223383e7a60fb10db9b0c2bbe974b247%22%5D%7D&view_mode=mosaic" preload="metadata"></video>
      <div class="video-controls">
        <button class="ctrl-btn" onclick="togglePlay()" id="playBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path id="playIcon" d="M8 5v14l11-7z"/></svg>
        </button>
        <input type="range" id="progressBar" class="progress-bar" value="0" min="0" step="0.1">
        <div class="volume-group">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          <input type="range" id="volumeBar" class="volume-bar" value="100" min="0" max="100">
        </div>
        <button class="ctrl-btn" onclick="toggleFullscreen()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="popupBackdrop" class="popup-backdrop" onclick="closePopup()">
  <div id="popupBackdrop" class="popup-backdrop" onclick="closePopup()">
    <div class="popup-card" onclick="event.stopPropagation()">
      <span class="close-x" onclick="closePopup()">&times;</span>
      <h2 id="popupTitle" style="margin-top:0;"></h2>
      <p id="popupBody" style="color: #666; margin-bottom: 25px;"></p>
      <button class="apple-btn-black" onclick="closePopup()">Done</button>
    </div>
  </div>

  <div class="page-shell" style="visibility:hidden; opacity:0;">
    <header class="site-header">
      <div class="nav-inner">
        <div class="logo">NestMate AI</div>
        <nav class="nav-links">
          <a href="#explore">Explore</a>
          <a href="#list-property">Host</a>
          <a href="#demo">AI Chat</a>
        </nav>
        <div class="user-menu-container">
          <div class="profile-trigger" onclick="toggleUserMenu()"><span>A</span></div>
          <div id="userDropdown" class="user-dropdown">
            <div class="dropdown-item" onclick="openPopup('Settings', 'Customize your NestMate preferences.')">Settings</div>
            <div class="dropdown-item" onclick="openPopup('Contact', 'Reach us at support@nestmate.ai')">Contact</div>
            <hr style="border:0; border-top:1px solid #eee; margin:5px 0;">
            <div class="dropdown-item logout-btn" onclick="handleLogout()" style="color:#ff3b30;">Logout</div>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="hero-section fade-in">
        <h1 class="hero-title">Live in London <span>for almost free.</span></h1>
        <p class="hero-copy">Rent a 3-bed house, fill spare rooms, and save up to £1,800.</p>
      </section>
      <!-- VIDEO BANNER SECTION -->
<section class="video-banner-section fade-in">
  <h2 class="video-banner-heading">Find your perfect space.</h2>
  <div class="video-banner-card" onclick="openVideoModal()">
    <img src="YOUR_BANNER_IMAGE.jpg" alt="NestMate London" class="video-banner-img">
    <div class="video-banner-overlay">
      <div class="video-play-hint">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        Watch the tour
      </div>
    </div>
  </div>
</section>

<section class="explore-section fade-in" id="explore" style="text-align:center;">
      <section class="explore-section fade-in" id="explore" style="text-align:center;">
        <h2>Available Listings</h2>
        <div class="toggle-group">
          <button class="toggle-btn active" onclick="setDuration('day', this)">Day</button>
          <button class="toggle-btn" onclick="setDuration('week', this)">Week</button>
          <button class="toggle-btn" onclick="setDuration('month', this)">Month</button>
        </div>
        <div class="carousel-outer"><div id="carouselTrack" class="carousel-track"></div></div>
      </section>

      <section class="upload-section fade-in" id="list-property">
        <div class="glass-card">
          <p style="color:#0071e3; font-weight:700; font-size:0.8rem; text-transform:uppercase;">For Hosts</p>
          <h2>Share your space.</h2>
          <input type="text" id="propName" placeholder="Property Name">
          <input type="number" id="propPriceWeek" placeholder="Weekly Rent (£)">
          <button onclick="uploadProperty()" class="apple-btn-black">Publish</button>
          <p id="uploadStatus"></p>
        </div>
      </section>

      <section class="demo-section fade-in" id="demo">
        <div class="chat-wrapper">
          <div class="chat-messages" id="chatBox"></div>
          <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Ask NestMate AI..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" class="send-btn">Send</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="src/responses.js"></script>
  <script src="src/chat.js"></script>
</body>
</html>
