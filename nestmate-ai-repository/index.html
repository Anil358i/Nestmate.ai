<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NestMate AI - London Housing</title>
  
  <link rel="stylesheet" href="src/style.css">

  <style>
    /* Security Guard Styles */
    #auth-overlay {
      position: fixed;
      inset: 0;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #111;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* Hidden by default, unlocked by Firebase */
    .page-shell { visibility: hidden; opacity: 0; transition: opacity 0.5s ease; }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDTxyr3zJGsyfmdztvfFz8aw9XSyPCNeQM",
      authDomain: "nestmate-ai.firebaseapp.com",
      projectId: "nestmate-ai",
      storageBucket: "nestmate-ai.firebasestorage.app",
      messagingSenderId: "7053398074",
      appId: "1:7053398074:web:13dc18b49402d95107a503"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    window.db = getFirestore(app);
    window.storage = getStorage(app);
    window.dbTools = { collection, addDoc, onSnapshot, query, orderBy, ref, uploadBytes, getDownloadURL };

    onAuthStateChanged(auth, (user) => {
      const overlay = document.getElementById('auth-overlay');
      const shell = document.querySelector('.page-shell');

      if (user && user.emailVerified) {
        // Unlock site
        if(overlay) overlay.style.display = 'none';
        if(shell) {
          shell.style.visibility = 'visible';
          shell.style.opacity = '1';
        }
        
        // Trigger animations immediately for first view
        document.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible'));

        if (typeof window.loadProperties === "function") window.loadProperties();
      } else {
        window.location.href = "login.html";
      }
    });
  </script>
<script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body>

  <div id="auth-overlay">
    <div class="spinner"></div>
    <p>Verifying Access...</p>
  </div>

  <div class="page-shell">
    <header class="site-header">
      <div class="nav-inner">
        <div class="logo">NestMate AI</div>
        <nav class="nav-links">
          <a href="#how-it-works">How it works</a>
          <a href="#list-property">Host</a>
          <a href="#demo">AI Chat</a>
        </nav>
        <button class="nav-cta">Beta</button>
      </div>
    </header>

    <main>
      <section class="hero-section fade-in">
        <h1 class="hero-title">Live in London <span>for almost free.</span></h1>
        <p class="hero-copy">Rent a 3-bed house, fill spare rooms, and save up to £1,800.</p>
      </section>

      <section class="upload-section fade-in" id="list-property">
        <div class="glass-card">
          <h2>List your property</h2>
          <input type="text" id="propName" placeholder="Property Name">
          <input type="number" id="propPriceWeek" placeholder="Weekly Rent (£)">
          <input type="file" id="propImage">
          <button onclick="uploadProperty()" class="btn btn-dark">Publish</button>
          <p id="uploadStatus"></p>
        </div>
      </section>

      <section class="demo-section fade-in" id="demo">
        <div class="chat-wrapper">
          <div class="chat-messages" id="chatBox"></div>
          <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Ask anything..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" class="send-btn">Send</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="src/responses.js"></script>
  <script src="src/chat.js"></script>
</body>
</html>
