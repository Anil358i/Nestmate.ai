<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestMate AI - Login</title>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; display: grid; place-items: center; height: 100vh; background: #f5f5f7; }
        .login-card { background: white; padding: 40px; border-radius: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); text-align: center; max-width: 350px; width: 90%; }
        h2 { margin-top: 0; letter-spacing: -0.02em; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; font-size: 1rem; outline: none; box-sizing: border-box; }
        button { background: #111; color: white; border: none; padding: 14px 28px; border-radius: 99px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
        #error-msg { color: #ff3b30; margin-top: 15px; font-size: 0.9rem; display: none; }
        .link { margin-top: 20px; font-size: 0.9rem; color: #555; }
        a { color: #007aff; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>NestMate AI</h2>
        <p>Login to your account</p>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <div id="error-msg"></div>
        <div class="link">Don't have an account? <a href="register.html">Register here</a></div>
    </div>

    <script type="module">
        // 1. Connect to Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // PASTE YOUR FIREBASE KEYS HERE
        const firebaseConfig = {
  apiKey: "AIzaSyDTxyr3zJGsyfmdztvfFz8aw9XSyPCNeQM",
  authDomain: "nestmate-ai.firebaseapp.com",
  projectId: "nestmate-ai",
  storageBucket: "nestmate-ai.firebasestorage.app",
  messagingSenderId: "7053398074",
  appId: "1:7053398074:web:13dc18b49402d95107a503"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 2. Handle the Login button click
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // 3. Check if they verified their email!
                if (user.emailVerified) {
                    sessionStorage.setItem('access_granted', 'true');
                    window.location.href = 'index.html';
                } else {
                    errorDiv.innerText = "Please verify your email first! Check your inbox.";
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.innerText = "Error: " + error.message;
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
