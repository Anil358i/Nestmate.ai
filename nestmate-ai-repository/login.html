<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestMate AI - Access</title>
    <style>
        body { 
            margin: 0; 
            font-family: -apple-system, sans-serif; 
            display: grid; 
            place-items: center; 
            height: 100vh; 
            background: #f5f5f7; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 28px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.1); 
            text-align: center; 
            max-width: 350px;
            width: 90%;
        }
        h2 { margin-top: 0; letter-spacing: -0.02em; }
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 20px 0; 
            border-radius: 12px; 
            border: 1px solid #ddd; 
            font-size: 1rem;
            outline: none;
        }
        button { 
            background: #111; 
            color: white; 
            border: none; 
            padding: 14px 28px; 
            border-radius: 99px; 
            font-weight: 600; 
            cursor: pointer; 
            width: 100%;
        }
        #error-msg { color: #ff3b30; margin-top: 15px; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>NestMate AI</h2>
        <p>Please enter the access code to view the beta site.</p>
        <input type="password" id="accessCode" placeholder="Access Code">
        <button onclick="validate()">Enter Site</button>
        <div id="error-msg">Incorrect code. Please try again.</div>
    </div>

    <script>
        function validate() {
            const code = document.getElementById('accessCode').value;
            // This is your secret password
            if (code === 'Anil2026') {
                sessionStorage.setItem('access_granted', 'true');
                window.location.href = 'index.html';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
